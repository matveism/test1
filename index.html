<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Checkpoint Quest | Real Google Search Challenge</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #10182e 0%, #0b1120 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
        }

        .quest-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 3rem;
            padding: 24px 28px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 16px;
        }

        .points-badge {
            background: #f5b04220;
            backdrop-filter: blur(8px);
            border: 1px solid #f5b04260;
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: 700;
            font-size: 1.7rem;
            color: #ffdf8c;
        }

        .points-badge span {
            font-size: 1rem;
            font-weight: 500;
            color: #b9c7d9;
            margin-right: 8px;
        }

        .tracking-status {
            background: #1e2a3e;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #cddcec;
        }

        .checkpoint-track {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0 28px 0;
            flex-wrap: wrap;
        }

        .checkpoint-node {
            background: #0f172ad9;
            border-radius: 48px;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            border: 1px solid #2d3a5e;
            transition: 0.2s;
        }

        .checkmark {
            font-size: 1.7rem;
            width: 32px;
            text-align: center;
        }

        .checkpoint-label {
            color: #94a3b8;
        }

        .checkpoint-node.completed {
            background: #1f3b2c;
            border-color: #2ecc71;
            box-shadow: 0 0 6px #2ecc7180;
        }

        .checkpoint-node.completed .checkpoint-label {
            color: #b9f6ca;
        }

        .checkpoint-node.active {
            border: 2px solid #f5b042;
            background: #1e2a3a;
            box-shadow: 0 0 10px #f5a62340;
        }

        .task-panel {
            background: #0a0f1c;
            border-radius: 2rem;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #29334b;
        }

        .task-header {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .reward {
            background: #222f44;
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 0.9rem;
            font-family: monospace;
            font-weight: bold;
            color: #ffd966;
        }

        .action-btn {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .action-btn.primary {
            background: #e67e22;
        }

        .iframe-container {
            margin-top: 20px;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 2px solid #2d3e61;
            background: #fff;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: none;
            background: white;
        }

        .info-message {
            background: #1e2a3e;
            border-radius: 20px;
            padding: 12px 18px;
            margin-top: 18px;
            font-size: 0.85rem;
            color: #b9d0f0;
        }

        .warning-box {
            background: #2a2a1a;
            border-left: 4px solid #ff9800;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
        }

        .success-box {
            background: #1a3a2a;
            border-left: 4px solid #2ecc71;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            color: #a8e6cf;
        }

        .hidden {
            display: none;
        }

        .green-check {
            color: #2ecc71;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2c46;
            color: #ffdfb3;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 9999;
            font-weight: bold;
            border: 1px solid #ffb347;
            animation: fadeInUp 0.3s ease;
            pointer-events: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .permission-pending {
            background: #2a2a3a;
            border: 1px solid #ffb347;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { border-color: #ffb347; box-shadow: 0 0 0 0 rgba(255, 180, 71, 0.4); }
            70% { border-color: #ffb347; box-shadow: 0 0 0 10px rgba(255, 180, 71, 0); }
            100% { border-color: #ffb347; box-shadow: 0 0 0 0 rgba(255, 180, 71, 0); }
        }
    </style>
</head>
<body>

<div class="quest-container" id="app">
    <div class="status-bar">
        <div class="points-badge">
            <span>💰 POINTS</span> <span id="pointsDisplay">0</span>
        </div>
        <div class="tracking-status" id="trackingStatusWidget">
            <span>📍</span> <span id="trackingText">Tracking: Pending</span>
        </div>
    </div>

    <div class="checkpoint-track">
        <div class="checkpoint-node" id="cp1Node">
            <div class="checkmark" id="cp1Mark">⏳</div>
            <div class="checkpoint-label">✅ Checkpoint 1 · 25 pts</div>
        </div>
        <div class="checkpoint-node" id="cp2Node">
            <div class="checkmark" id="cp2Mark">⏳</div>
            <div class="checkpoint-label">🌐 Checkpoint 2 · 75 pts</div>
        </div>
        <div class="checkpoint-node" id="cp3Node">
            <div class="checkmark" id="cp3Mark">🔒</div>
            <div class="checkpoint-label">🎯 Final · Verification</div>
        </div>
    </div>

    <div class="task-panel" id="taskPanel">
        <div class="task-header">
            <span id="taskTitle">📍 Allow Tracking First</span>
            <span class="reward" id="taskReward">+25 pts</span>
        </div>
        <div id="taskDescription" class="info-message permission-pending">
            🔐 <strong>Tracking permission required!</strong> Chrome/Safari will show a popup - please click "Allow" to continue.
        </div>
        <div id="actionArea"></div>
        <div id="iframeZone" class="iframe-container hidden">
            <iframe id="trackingFrame" src="about:blank" title="Google Search"></iframe>
        </div>
        <div id="verificationMessage" class="info-message hidden"></div>
    </div>
</div>

<script>
    // Load saved state from localStorage
    let currentCheckpoint = parseInt(localStorage.getItem('checkpoint_curr')) || 0;
    let totalPoints = parseInt(localStorage.getItem('points_total')) || 0;
    let trackingAllowed = localStorage.getItem('tracking_allowed') === 'true';
    let checkpoint1Completed = localStorage.getItem('cp1_complete') === 'true';
    let checkpoint2Completed = localStorage.getItem('cp2_complete') === 'true';
    
    const TARGET_URL = "schedulebuilder.org";
    
    const pointsSpan = document.getElementById('pointsDisplay');
    const cp1Node = document.getElementById('cp1Node');
    const cp2Node = document.getElementById('cp2Node');
    const cp3Node = document.getElementById('cp3Node');
    const cp1Mark = document.getElementById('cp1Mark');
    const cp2Mark = document.getElementById('cp2Mark');
    const cp3Mark = document.getElementById('cp3Mark');
    const taskTitleSpan = document.getElementById('taskTitle');
    const taskRewardSpan = document.getElementById('taskReward');
    const taskDescDiv = document.getElementById('taskDescription');
    const actionArea = document.getElementById('actionArea');
    const iframeZone = document.getElementById('iframeZone');
    const trackingFrame = document.getElementById('trackingFrame');
    const verificationMsgDiv = document.getElementById('verificationMessage');
    const trackingTextSpan = document.getElementById('trackingText');
    
    function saveState() {
        localStorage.setItem('checkpoint_curr', currentCheckpoint);
        localStorage.setItem('points_total', totalPoints);
        localStorage.setItem('tracking_allowed', trackingAllowed);
        localStorage.setItem('cp1_complete', checkpoint1Completed);
        localStorage.setItem('cp2_complete', checkpoint2Completed);
    }
    
    function updatePointsUI() {
        pointsSpan.innerText = totalPoints;
        saveState();
    }
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#2c1a1a' : '#1f2c46';
        toast.style.borderColor = isError ? '#e74c3c' : '#ffb347';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
    }
    
    function updateCheckpointVisuals() {
        if (checkpoint1Completed) {
            cp1Node.classList.add('completed');
            cp1Mark.innerHTML = '✔️';
            cp1Mark.classList.add('green-check');
        } else {
            cp1Node.classList.remove('completed');
            cp1Mark.innerHTML = currentCheckpoint === 1 ? '⏳' : (trackingAllowed ? '◻️' : '🔒');
        }
        
        if (checkpoint2Completed) {
            cp2Node.classList.add('completed');
            cp2Mark.innerHTML = '✔️';
            cp2Mark.classList.add('green-check');
        } else {
            cp2Node.classList.remove('completed');
            cp2Mark.innerHTML = currentCheckpoint === 2 ? '⏳' : (checkpoint1Completed ? '◻️' : '🔒');
        }
        
        if (checkpoint1Completed && checkpoint2Completed) {
            cp3Node.classList.add('completed');
            cp3Mark.innerHTML = '🏆';
        } else {
            cp3Node.classList.remove('completed');
            cp3Mark.innerHTML = '🔒';
        }
        
        if (currentCheckpoint === 1 && !checkpoint1Completed) cp1Node.classList.add('active');
        else cp1Node.classList.remove('active');
        if (currentCheckpoint === 2 && !checkpoint2Completed) cp2Node.classList.add('active');
        else cp2Node.classList.remove('active');
        
        saveState();
    }
    
    function awardCheckpoint1() {
        if (checkpoint1Completed) return;
        checkpoint1Completed = true;
        totalPoints += 25;
        updatePointsUI();
        currentCheckpoint = 2;
        updateCheckpointVisuals();
        renderCurrentTask();
        showToast("🎉 +25 Points! Checkpoint 1 complete! Now find schedulebuilder.org to earn 75 points!");
        saveState();
    }
    
    function awardCheckpoint2() {
        if (checkpoint2Completed) return;
        checkpoint2Completed = true;
        totalPoints += 75;
        updatePointsUI();
        currentCheckpoint = 3;
        updateCheckpointVisuals();
        renderCurrentTask();
        showToast("🏆 +75 Points! You found schedulebuilder.org! Mission complete!");
        saveState();
    }
    
    // Monitor iframe navigation to detect when user visits schedulebuilder.org
    function setupIframeTracking() {
        trackingFrame.addEventListener('load', function() {
            let currentUrl = "";
            try {
                currentUrl = trackingFrame.contentWindow.location.href;
            } catch(e) {
                currentUrl = trackingFrame.src;
            }
            
            console.log("[Tracker] Iframe loaded:", currentUrl);
            
            // Checkpoint 1: User needs to search for "Schedule Online" on Google
            if (!checkpoint1Completed && trackingAllowed && currentCheckpoint === 1) {
                if (currentUrl.includes('google.com') && (currentUrl.includes('q=Schedule+Online') || currentUrl.includes('q=Schedule%20Online') || currentUrl.toLowerCase().includes('schedule online'))) {
                    awardCheckpoint1();
                    showToast("✅ Great! You searched for 'Schedule Online'! +25 points awarded!");
                }
            }
            
            // Checkpoint 2: User needs to find and click schedulebuilder.org
            if (!checkpoint2Completed && checkpoint1Completed && trackingAllowed && currentCheckpoint === 2) {
                if (currentUrl.toLowerCase().includes(TARGET_URL)) {
                    awardCheckpoint2();
                    showToast("🎯 Perfect! You found schedulebuilder.org! +75 points awarded!");
                }
            }
        });
    }
    
    function renderCurrentTask() {
        if (!trackingAllowed) {
            taskTitleSpan.innerText = "🔔 Allow Tracking to Start";
            taskRewardSpan.innerText = "🔓 Required";
            taskDescDiv.innerHTML = `
                <strong>⚠️ Chrome / Safari Tracking Permission Required</strong><br><br>
                A browser popup will appear automatically. You MUST click <strong>"Allow"</strong> to start earning points.<br>
                This permission is needed to verify your task completion.
                <div class="warning-box" style="margin-top: 15px;">
                    💡 <strong>No popup?</strong> If you don't see a popup, check if notifications are blocked in your browser settings.
                </div>
            `;
            actionArea.innerHTML = `<button class="action-btn primary" id="retryPermissionBtn">🔄 Retry Permission Request</button>`;
            iframeZone.classList.add('hidden');
            verificationMsgDiv.classList.add('hidden');
            
            const retryBtn = document.getElementById('retryPermissionBtn');
            if (retryBtn) {
                retryBtn.onclick = () => {
                    requestTrackingPermission();
                };
            }
            return;
        }
        
        if (!checkpoint1Completed) {
            taskTitleSpan.innerText = "🌐 Checkpoint 1 · Search 'Schedule Online' on Google";
            taskRewardSpan.innerText = "+25 pts";
            taskDescDiv.innerHTML = `
                <div class="warning-box">
                    <strong>📋 INSTRUCTIONS:</strong><br>
                    1. In the Google iframe below, type <strong>"Schedule Online"</strong> in the search bar<br>
                    2. Press Enter or click Google Search<br>
                    3. Once you search for "Schedule Online", you'll automatically earn 25 points!
                </div>
            `;
            actionArea.innerHTML = `<button class="action-btn secondary" id="resetGoogleBtn">🔄 Reset to Google.com</button>`;
            iframeZone.classList.remove('hidden');
            verificationMsgDiv.classList.add('hidden');
            
            if (trackingFrame.src === "about:blank" || trackingFrame.src.includes("about:blank")) {
                trackingFrame.src = "https://www.google.com";
            }
            
            const resetBtn = document.getElementById('resetGoogleBtn');
            if (resetBtn) {
                resetBtn.onclick = () => {
                    trackingFrame.src = "https://www.google.com";
                    showToast("Reset to Google.com");
                };
            }
            return;
        }
        else if (!checkpoint2Completed) {
            taskTitleSpan.innerText = "🎯 Checkpoint 2 · Find and Visit schedulebuilder.org";
            taskRewardSpan.innerText = "+75 pts";
            taskDescDiv.innerHTML = `
                <div class="warning-box">
                    <strong>🎯 MISSION:</strong><br>
                    In the Google search results below, find and click the link to <strong>schedulebuilder.org</strong><br><br>
                    <strong>Task:</strong><br>
                    1. Use Google search (try searching "Schedule Online" if needed)<br>
                    2. Look through the search results carefully<br>
                    3. Click on the result that goes to <strong>schedulebuilder.org</strong><br>
                    4. Once you visit the site, you'll automatically earn 75 points!
                </div>
                <div class="success-box" style="margin-top: 10px;">
                    💡 <strong>Hint:</strong> The correct link is in the search results. Find it yourself!
                </div>
            `;
            actionArea.innerHTML = `
                <button class="action-btn secondary" id="resetGoogleCp2">🔄 Reset to Google.com</button>
                <button class="action-btn" id="searchAgainBtn" style="margin-left: 10px;">🔍 Search "Schedule Online"</button>
            `;
            iframeZone.classList.remove('hidden');
            verificationMsgDiv.classList.add('hidden');
            
            if (trackingFrame.src === "about:blank" || !trackingFrame.src.includes("google.com")) {
                trackingFrame.src = "https://www.google.com";
            }
            
            const resetBtn = document.getElementById('resetGoogleCp2');
            if (resetBtn) {
                resetBtn.onclick = () => {
                    trackingFrame.src = "https://www.google.com";
                    showToast("Reset to Google.com");
                };
            }
            
            const searchBtn = document.getElementById('searchAgainBtn');
            if (searchBtn) {
                searchBtn.onclick = () => {
                    trackingFrame.src = "https://www.google.com/search?q=Schedule+Online";
                    showToast("🔍 Searching for 'Schedule Online'...");
                };
            }
            return;
        }
        else {
            taskTitleSpan.innerText = "🎉 Challenge Complete!";
            taskRewardSpan.innerText = "🏁 Finished";
            taskDescDiv.innerHTML = `
                <div class="success-box">
                    ✨ You collected ${totalPoints} points! Great job completing both checkpoints!<br><br>
                    <strong>Summary:</strong><br>
                    ✓ Checkpoint 1: Searched for "Schedule Online" (+25 pts)<br>
                    ✓ Checkpoint 2: Found schedulebuilder.org (+75 pts)<br><br>
                    🎮 Total: ${totalPoints} points
                </div>
            `;
            actionArea.innerHTML = `<button class="action-btn" disabled>✅ Mission Accomplished</button>`;
            iframeZone.classList.add('hidden');
            verificationMsgDiv.classList.remove('hidden');
            verificationMsgDiv.innerHTML = `🏅 Congratulations! You completed all checkpoints! Total points: ${totalPoints}`;
            return;
        }
    }
    
    function requestTrackingPermission() {
        if (trackingAllowed) {
            showToast("Tracking already allowed!");
            return;
        }
        
        // Use Notification API for clean browser permission popup
        if (Notification.permission === "granted") {
            trackingAllowed = true;
            trackingTextSpan.innerText = "Tracking: ACTIVE ✅";
            taskDescDiv.classList.remove('permission-pending');
            currentCheckpoint = 1;
            updateCheckpointVisuals();
            renderCurrentTask();
            showToast("✅ Tracking allowed! Now use Google to search for 'Schedule Online'");
            saveState();
        } else if (Notification.permission !== "denied") {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    trackingAllowed = true;
                    trackingTextSpan.innerText = "Tracking: ACTIVE ✅";
                    taskDescDiv.classList.remove('permission-pending');
                    currentCheckpoint = 1;
                    updateCheckpointVisuals();
                    renderCurrentTask();
                    showToast("✅ Tracking allowed! Now use Google to search for 'Schedule Online'");
                    saveState();
                } else {
                    showToast("❌ You must allow tracking to continue. Click 'Retry Permission Request' and select 'Allow'.", true);
                    trackingTextSpan.innerText = "Tracking: DENIED";
                }
            });
        } else {
            // If notifications are blocked, show instructions
            showToast("⚠️ Notifications are blocked. Please check browser settings and allow notifications for this site.", true);
            trackingTextSpan.innerText = "Tracking: BLOCKED";
        }
    }
    
    // Automatically request permission when page loads
    function autoRequestPermission() {
        // Only request if tracking not already allowed and not completed
        if (!trackingAllowed && !checkpoint1Completed && !checkpoint2Completed) {
            // Small delay to ensure page is ready
            setTimeout(() => {
                if (Notification.permission === "default") {
                    Notification.requestPermission().then(permission => {
                        if (permission === "granted") {
                            trackingAllowed = true;
                            trackingTextSpan.innerText = "Tracking: ACTIVE ✅";
                            taskDescDiv.classList.remove('permission-pending');
                            currentCheckpoint = 1;
                            updateCheckpointVisuals();
                            renderCurrentTask();
                            showToast("✅ Tracking allowed! Now use Google to search for 'Schedule Online'");
                            saveState();
                        } else {
                            trackingTextSpan.innerText = "Tracking: DENIED";
                            showToast("❌ Tracking permission denied. Click 'Retry Permission Request' to try again.", true);
                        }
                    });
                } else if (Notification.permission === "granted") {
                    trackingAllowed = true;
                    trackingTextSpan.innerText = "Tracking: ACTIVE ✅";
                    taskDescDiv.classList.remove('permission-pending');
                    currentCheckpoint = 1;
                    updateCheckpointVisuals();
                    renderCurrentTask();
                    showToast("✅ Tracking already allowed! Now use Google to search for 'Schedule Online'");
                    saveState();
                }
            }, 500);
        } else if (trackingAllowed) {
            trackingTextSpan.innerText = "Tracking: ACTIVE ✅";
            taskDescDiv.classList.remove('permission-pending');
            updateCheckpointVisuals();
            renderCurrentTask();
        }
    }
    
    function init() {
        updatePointsUI();
        updateCheckpointVisuals();
        setupIframeTracking();
        
        // Auto-request permission on page load
        autoRequestPermission();
        
        if (checkpoint1Completed && checkpoint2Completed) {
            showToast("🎉 Welcome back! You've already completed all checkpoints!");
            trackingTextSpan.innerText = "Tracking: ACTIVE ✅";
        } else if (trackingAllowed && !checkpoint1Completed) {
            showToast("📍 Tracking active! Search for 'Schedule Online' on Google to earn 25 points.");
        }
    }
    
    init();
</script>
</body>
</html>
