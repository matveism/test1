<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Checkpoint Quest | Earn Points by Completing Tasks</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* subtle, avoid accidental text selection on buttons */
        }

        body {
            background: linear-gradient(145deg, #10182e 0%, #0b1120 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
        }

        /* main card container */
        .quest-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 3rem;
            padding: 24px 28px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }

        /* header + points */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 16px;
        }

        .points-badge {
            background: #f5b04220;
            backdrop-filter: blur(8px);
            border: 1px solid #f5b04260;
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: 700;
            font-size: 1.7rem;
            color: #ffdf8c;
            letter-spacing: 1px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .points-badge span {
            font-size: 1rem;
            font-weight: 500;
            color: #b9c7d9;
            margin-right: 8px;
        }

        .tracking-status {
            background: #1e2a3e;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #cddcec;
        }

        .checkpoint-track {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0 28px 0;
            flex-wrap: wrap;
        }

        .checkpoint-node {
            background: #0f172ad9;
            border-radius: 48px;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            border: 1px solid #2d3a5e;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }

        .checkmark {
            font-size: 1.7rem;
            width: 32px;
            text-align: center;
        }

        .checkpoint-label {
            color: #94a3b8;
        }

        .checkpoint-node.completed {
            background: #1f3b2c;
            border-color: #2ecc71;
            box-shadow: 0 0 6px #2ecc7180;
        }

        .checkpoint-node.completed .checkpoint-label {
            color: #b9f6ca;
        }

        .checkpoint-node.active {
            border: 2px solid #f5b042;
            background: #1e2a3a;
            box-shadow: 0 0 10px #f5a62340;
        }

        /* main task area */
        .task-panel {
            background: #0a0f1c;
            border-radius: 2rem;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #29334b;
        }

        .task-header {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .reward {
            background: #222f44;
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 0.9rem;
            font-family: monospace;
            font-weight: bold;
            color: #ffd966;
        }

        .action-btn {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            box-shadow: 0 1px 2px black;
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .action-btn.primary {
            background: #e67e22;
            color: white;
            box-shadow: 0 4px 12px #e67e2240;
        }

        .action-btn.secondary {
            background: #2c3e66;
        }

        .iframe-container {
            margin-top: 20px;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 2px solid #2d3e61;
            background: #00000022;
            transition: 0.2s;
        }

        iframe {
            width: 100%;
            height: 520px;
            border: none;
            background: #fff;
        }

        .info-message {
            background: #1e2a3e;
            border-radius: 20px;
            padding: 12px 18px;
            margin-top: 18px;
            font-size: 0.85rem;
            color: #b9d0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .loader-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #aaa;
            border-top: 2px solid #ffb347;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .green-check {
            color: #2ecc71;
            font-size: 1.3rem;
            filter: drop-shadow(0 0 2px #2ecc71);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .row-link-highlight {
            background: #26334d;
            border-left: 4px solid #ffb347;
            padding: 8px 14px;
            font-family: monospace;
            border-radius: 20px;
        }

        @media (max-width: 780px) {
            .quest-container {
                padding: 16px;
            }
            iframe {
                height: 420px;
            }
        }
    </style>
</head>
<body>

<div class="quest-container" id="app">
    <!-- status bar -->
    <div class="status-bar">
        <div class="points-badge">
            <span>💰 POINTS</span> <span id="pointsDisplay">0</span>
        </div>
        <div class="tracking-status" id="trackingStatusWidget">
            <span>📍</span> <span id="trackingText">Tracking: Pending</span>
        </div>
    </div>

    <!-- checkpoint visual markers -->
    <div class="checkpoint-track">
        <div class="checkpoint-node" id="cp1Node">
            <div class="checkmark" id="cp1Mark">⏳</div>
            <div class="checkpoint-label">✅ Checkpoint 1 · 25 pts</div>
        </div>
        <div class="checkpoint-node" id="cp2Node">
            <div class="checkmark" id="cp2Mark">⏳</div>
            <div class="checkpoint-label">🌐 Checkpoint 2 · 75 pts</div>
        </div>
        <div class="checkpoint-node" id="cp3Node">
            <div class="checkmark" id="cp3Mark">🔒</div>
            <div class="checkpoint-label">🎯 Final · 0 pts (verification)</div>
        </div>
    </div>

    <!-- DYNAMIC TASK PANEL: changes based on active checkpoint -->
    <div class="task-panel" id="taskPanel">
        <div class="task-header">
            <span id="taskTitle">📍 Allow Tracking First</span>
            <span class="reward" id="taskReward">+25 pts</span>
        </div>
        <div id="taskDescription" class="info-message">
            🔐 You must click "Allow Tracking" (Chrome/Safari permission). Then first checkpoint unlocks.
        </div>
        <div id="actionArea"></div>
        <div id="iframeZone" class="iframe-container hidden">
            <iframe id="trackingFrame" src="about:blank" title="tracking frame"></iframe>
        </div>
        <div id="verificationMessage" class="info-message hidden"></div>
    </div>
</div>

<script>
    // ---------- STATE ----------
    let currentCheckpoint = 0;   // 0 = tracking not allowed yet, 1 = checkpoint1 (25pts google+schedule online), 2 = checkpoint2 (75pts + 4th row link)
    let totalPoints = 0;
    let trackingAllowed = false;   // actual permission from browser (or simulated fallback)
    let checkpoint1Completed = false;
    let checkpoint2Completed = false;
    
    // special tracking: we will monitor iframe navigation events for checkpoint 1 and 2
    let cp1Validated = false;      // already earned 25pts?
    let cp2Validated = false;      // earned 75pts?
    let cp2LinkMatched = false;     // did user click the exact correct link in iframe? we track manually.
    
    // DOM elements
    const pointsSpan = document.getElementById('pointsDisplay');
    const cp1Node = document.getElementById('cp1Node');
    const cp2Node = document.getElementById('cp2Node');
    const cp3Node = document.getElementById('cp3Node');
    const cp1Mark = document.getElementById('cp1Mark');
    const cp2Mark = document.getElementById('cp2Mark');
    const cp3Mark = document.getElementById('cp3Mark');
    const taskTitleSpan = document.getElementById('taskTitle');
    const taskRewardSpan = document.getElementById('taskReward');
    const taskDescDiv = document.getElementById('taskDescription');
    const actionArea = document.getElementById('actionArea');
    const iframeZone = document.getElementById('iframeZone');
    const trackingFrame = document.getElementById('trackingFrame');
    const verificationMsgDiv = document.getElementById('verificationMessage');
    const trackingTextSpan = document.getElementById('trackingText');
    
    // Hidden correct link for checkpoint2: "https://schedulebuilder.org/"
    const CORRECT_LINK = "https://schedulebuilder.org/";
    
    // Helper: update UI points
    function updatePointsUI() {
        pointsSpan.innerText = totalPoints;
    }
    
    // Helper: update checkpoint visuals
    function updateCheckpointVisuals() {
        // Checkpoint 1 node
        if (checkpoint1Completed) {
            cp1Node.classList.add('completed');
            cp1Mark.innerHTML = '✔️';
            cp1Mark.classList.add('green-check');
        } else {
            cp1Node.classList.remove('completed');
            cp1Mark.innerHTML = currentCheckpoint === 1 ? '⏳' : (trackingAllowed ? '◻️' : '🔒');
        }
        // Checkpoint 2 node
        if (checkpoint2Completed) {
            cp2Node.classList.add('completed');
            cp2Mark.innerHTML = '✔️';
            cp2Mark.classList.add('green-check');
        } else {
            cp2Node.classList.remove('completed');
            cp2Mark.innerHTML = currentCheckpoint === 2 ? '⏳' : (checkpoint1Completed ? '◻️' : '🔒');
        }
        // Final node (just style)
        if (checkpoint1Completed && checkpoint2Completed) {
            cp3Node.classList.add('completed');
            cp3Mark.innerHTML = '🏆';
        } else {
            cp3Node.classList.remove('completed');
            cp3Mark.innerHTML = '🔒';
        }
        // active highlight
        if (currentCheckpoint === 1 && !checkpoint1Completed) cp1Node.classList.add('active');
        else cp1Node.classList.remove('active');
        if (currentCheckpoint === 2 && !checkpoint2Completed) cp2Node.classList.add('active');
        else cp2Node.classList.remove('active');
        if (currentCheckpoint === 3) cp3Node.classList.add('active');
        else cp3Node.classList.remove('active');
    }
    
    // render task based on currentCheckpoint and trackingAllowed
    function renderCurrentTask() {
        if (!trackingAllowed) {
            // tracking not yet granted: show permission button
            taskTitleSpan.innerText = "🔔 Allow tracking (required)";
            taskRewardSpan.innerText = "🔓 Unlock system";
            taskDescDiv.innerHTML = "⚠️ Chrome / Safari will show a browser popup. You must click 'Allow' to start the checkpoint journey. After allowing, checkpoint1 will appear.";
            actionArea.innerHTML = `<button class="action-btn primary" id="requestTrackingBtn">📡 Request Tracking Permission</button>`;
            iframeZone.classList.add('hidden');
            verificationMsgDiv.classList.add('hidden');
            const btn = document.getElementById('requestTrackingBtn');
            if (btn) btn.onclick = requestTrackingPermission;
            return;
        }
        
        // tracking allowed - handle checkpoints
        if (!checkpoint1Completed) {
            // checkpoint 1: 25 pts - user must go to google.com and type "Schedule Online" (via iframe)
            taskTitleSpan.innerText = "🌐 Checkpoint 1 · Visit Google & search";
            taskRewardSpan.innerText = "+25 pts";
            taskDescDiv.innerHTML = `✔️ Step: Use the iframe below to open <strong>google.com</strong>, then type <strong>"Schedule Online"</strong> and press Enter. 
            <br>🔄 The system will detect when you successfully navigate to google results / google domain with that query. Once verified, you'll instantly earn 25 points!`;
            actionArea.innerHTML = `<button class="action-btn secondary" id="resetGoogleBtn">🔁 Reset iframe to Google.com</button>`;
            iframeZone.classList.remove('hidden');
            verificationMsgDiv.classList.add('hidden');
            trackingFrame.src = "https://www.google.com";
            const resetBtn = document.getElementById('resetGoogleBtn');
            if (resetBtn) resetBtn.onclick = () => { trackingFrame.src = "https://www.google.com"; };
            return;
        } 
        else if (!checkpoint2Completed) {
            // checkpoint 2: 75 pts - user must open 4th row link that matches schedulebuilder.org
            taskTitleSpan.innerText = "🎯 Checkpoint 2 · Click the correct 4th row link";
            taskRewardSpan.innerText = "+75 pts";
            taskDescDiv.innerHTML = `🔍 <strong>Mission:</strong> In the iframe below, navigate / click the <strong>4th row</strong> link that matches exactly:<br>
            <div class="row-link-highlight">🔗 ${CORRECT_LINK}</div>
            Once you click the correct matching URL, you'll receive 75 points! (iframe will track your clicks).`;
            actionArea.innerHTML = `<button class="action-btn secondary" id="resetToGoogleCp2">🔄 Reset to google.com</button>`;
            iframeZone.classList.remove('hidden');
            verificationMsgDiv.classList.add('hidden');
            trackingFrame.src = "https://www.google.com";
            const resetCp2 = document.getElementById('resetToGoogleCp2');
            if (resetCp2) resetCp2.onclick = () => { trackingFrame.src = "https://www.google.com"; };
            return;
        }
        else {
            // all checkpoints complete
            taskTitleSpan.innerText = "🎉 Challenge Complete!";
            taskRewardSpan.innerText = "🏁 Finished";
            taskDescDiv.innerHTML = `✨ You collected ${totalPoints} points! Great job completing both checkpoints. Tracking verified.`;
            actionArea.innerHTML = `<button class="action-btn" disabled>✅ Mastered</button>`;
            iframeZone.classList.add('hidden');
            verificationMsgDiv.classList.remove('hidden');
            verificationMsgDiv.innerHTML = `🏅 Congratulations! All checkpoints passed. Final points: ${totalPoints}`;
            verificationMsgDiv.classList.remove('hidden');
            return;
        }
    }
    
    // function to award checkpoint1 (25pts)
    function awardCheckpoint1() {
        if (checkpoint1Completed) return;
        checkpoint1Completed = true;
        totalPoints += 25;
        updatePointsUI();
        // move to checkpoint 2
        currentCheckpoint = 2;
        updateCheckpointVisuals();
        renderCurrentTask();
        showToastMessage("🎉 +25 Points! Checkpoint 1 complete. Moving to Checkpoint 2 (75pts)");
    }
    
    // award checkpoint2 (75pts)
    function awardCheckpoint2() {
        if (checkpoint2Completed) return;
        checkpoint2Completed = true;
        totalPoints += 75;
        updatePointsUI();
        currentCheckpoint = 3;
        updateCheckpointVisuals();
        renderCurrentTask();
        showToastMessage("🏆 +75 Points! You clicked the correct hidden link! Mission accomplished.");
    }
    
    // mini toast (simple)
    function showToastMessage(msg) {
        const existing = document.querySelector('.custom-toast');
        if(existing) existing.remove();
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#1f2c46';
        toast.style.color = '#ffdfb3';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '60px';
        toast.style.zIndex = '9999';
        toast.style.fontWeight = 'bold';
        toast.style.border = '1px solid #ffb347';
        toast.style.backdropFilter = 'blur(12px)';
        toast.style.fontSize = '0.9rem';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }
    
    // IFRAME EVENT HANDLER: we need to track both navigation and click (by monitoring iframe location changes & possible link clicks)
    // Because of cross-origin restrictions we cannot read full iframe DOM, but we can detect src changes via load event + iframe's contentWindow.location?
    // Actually due to CORS we cannot read google.com iframe location, but we can listen to iframe 'load' event and capture its src property.
    // For checkpoint1: we need to detect when user navigates to google.com/search?q=Schedule+Online OR any google result page containing schedule online.
    // For checkpoint2: We need to detect that user clicked a link that leads to "https://schedulebuilder.org/" inside iframe.
    // Since we cannot directly intercept click due to cross-origin, we will listen for iframe navigation (window.location changes inside iframe) 
    // Because google results page, when a user clicks a search result, the iframe navigates to the target link. We can catch that via iframe 'load' and read iframe.src
    // For checkpoint2: if the iframe navigates to CORRECT_LINK, we award points.
    // Additional: for checkpoint1 we check if current src includes google.com/search and has "Schedule+Online" or similar.
    
    function setupIframeTracking() {
        trackingFrame.addEventListener('load', function onFrameLoad() {
            let frameSrc = "";
            try {
                // try to get src attribute (safest)
                frameSrc = trackingFrame.contentWindow?.location?.href || trackingFrame.src;
            } catch(e) {
                frameSrc = trackingFrame.src;
            }
            if (!frameSrc) frameSrc = trackingFrame.src;
            console.log("[iframe] navigated to:", frameSrc);
            
            // ---- Checkpoint 1 validation ----
            if (!checkpoint1Completed && trackingAllowed && currentCheckpoint === 1) {
                // user must go to google.com and type "Schedule Online"
                // we validate if current url is google search with "schedule online" query (case-insensitive)
                const lowerUrl = frameSrc.toLowerCase();
                if ((lowerUrl.includes('google.com/search') || lowerUrl.includes('google.com/#')) && 
                    (lowerUrl.includes('schedule+online') || lowerUrl.includes('schedule%20online') || lowerUrl.includes('schedule online'))) {
                    awardCheckpoint1();
                }
                // also edge: sometimes user might be on google.com and typed but not search? but load catches it.
                // also if google homepage and we wait for query param
            }
            
            // ---- Checkpoint 2 validation (exact match CORRECT_LINK) ----
            if (!checkpoint2Completed && checkpoint1Completed && trackingAllowed && currentCheckpoint === 2) {
                // normalize both
                let normalized = frameSrc.split('?')[0].split('#')[0];
                if (normalized === CORRECT_LINK || normalized === CORRECT_LINK.replace(/\/$/, '') || frameSrc === CORRECT_LINK) {
                    // matched the hidden correct link
                    if (!cp2Validated) {
                        cp2Validated = true;
                        awardCheckpoint2();
                    }
                }
                // also extra: because we need to verify user clicked "4th row" but due to iframe we can't know row index, but we instruct
                // user to open 4th row that matches correct link, so we detect correct URL. That's the functional requirement.
            }
        });
    }
    
    // Request tracking permission for Chrome/Safari (notifications/geolocation? we use generic "tracking" popup)
    // To simulate a browser permission popup, we use Notification API or Geolocation (most common). We'll use Geolocation to get "Allow" prompt.
    // The requirement: "First user must click allow tracking if user uses chrome or safari there is will be pop up user must allow it"
    function requestTrackingPermission() {
        if (trackingAllowed) {
            showToastMessage("Tracking already allowed!");
            return;
        }
        // Use Geolocation API to trigger permission popup (works in Chrome/Safari)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    // user allowed
                    trackingAllowed = true;
                    trackingTextSpan.innerText = "Tracking: ACTIVE ✅";
                    currentCheckpoint = 1;   // after tracking allowed, first checkpoint starts
                    updateCheckpointVisuals();
                    renderCurrentTask();
                    showToastMessage("✅ Tracking allowed! Now proceed to Checkpoint 1 (25pts).");
                    // ensure iframe shows google
                    iframeZone.classList.remove('hidden');
                    trackingFrame.src = "https://www.google.com";
                },
                (error) => {
                    console.warn("Geolocation denied", error);
                    showToastMessage("❌ You must allow tracking permission (location) to continue. Click again and 'Allow'.");
                    trackingTextSpan.innerText = "Tracking: DENIED";
                },
                { enableHighAccuracy: false, timeout: 8000 }
            );
        } else {
            // fallback if no geolocation (simulate manual allow button)
            if(confirm("Browser doesn't support auto-permission. Simulate tracking? (For demo click OK)")) {
                trackingAllowed = true;
                trackingTextSpan.innerText = "Tracking: ACTIVE (simulated)";
                currentCheckpoint = 1;
                updateCheckpointVisuals();
                renderCurrentTask();
                trackingFrame.src = "https://www.google.com";
                showToastMessage("Tracking manually allowed (demo mode)");
            }
        }
    }
    
    // For initial state: tracking not allowed, show request button, hide iframe
    function init() {
        trackingAllowed = false;
        checkpoint1Completed = false;
        checkpoint2Completed = false;
        totalPoints = 0;
        currentCheckpoint = 0;
        updatePointsUI();
        trackingTextSpan.innerText = "Tracking: Pending";
        updateCheckpointVisuals();
        renderCurrentTask();
        setupIframeTracking();
    }
    
    // manually ensure that iframe loads google for fresh experience
    init();
</script>
</body>
</html>
