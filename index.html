<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Checkpoint Quest | Earn Points by Completing Tasks</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #10182e 0%, #0b1120 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
        }

        .quest-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 3rem;
            padding: 24px 28px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 16px;
        }

        .points-badge {
            background: #f5b04220;
            backdrop-filter: blur(8px);
            border: 1px solid #f5b04260;
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: 700;
            font-size: 1.7rem;
            color: #ffdf8c;
        }

        .points-badge span {
            font-size: 1rem;
            font-weight: 500;
            color: #b9c7d9;
            margin-right: 8px;
        }

        .tracking-status {
            background: #1e2a3e;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #cddcec;
        }

        .checkpoint-track {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0 28px 0;
            flex-wrap: wrap;
        }

        .checkpoint-node {
            background: #0f172ad9;
            border-radius: 48px;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            border: 1px solid #2d3a5e;
            transition: 0.2s;
        }

        .checkmark {
            font-size: 1.7rem;
            width: 32px;
            text-align: center;
        }

        .checkpoint-label {
            color: #94a3b8;
        }

        .checkpoint-node.completed {
            background: #1f3b2c;
            border-color: #2ecc71;
            box-shadow: 0 0 6px #2ecc7180;
        }

        .checkpoint-node.completed .checkpoint-label {
            color: #b9f6ca;
        }

        .checkpoint-node.active {
            border: 2px solid #f5b042;
            background: #1e2a3a;
            box-shadow: 0 0 10px #f5a62340;
        }

        .task-panel {
            background: #0a0f1c;
            border-radius: 2rem;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #29334b;
        }

        .task-header {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .reward {
            background: #222f44;
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 0.9rem;
            font-family: monospace;
            font-weight: bold;
            color: #ffd966;
        }

        .action-btn {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .action-btn.primary {
            background: #e67e22;
        }

        .iframe-container {
            margin-top: 20px;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 2px solid #2d3e61;
            background: white;
        }

        iframe {
            width: 100%;
            height: 520px;
            border: none;
        }

        .info-message {
            background: #1e2a3e;
            border-radius: 20px;
            padding: 12px 18px;
            margin-top: 18px;
            font-size: 0.85rem;
            color: #b9d0f0;
        }

        .search-simulator {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .google-search-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            background: white;
            padding: 15px;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .google-search-bar input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }

        .google-search-bar button {
            background: #4285f4;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 500;
        }

        .search-results {
            margin-top: 20px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }

        .result-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .result-item:hover {
            background: #f8f9fa;
        }

        .result-title {
            color: #1a0dab;
            font-size: 18px;
            font-weight: normal;
            margin-bottom: 5px;
        }

        .result-url {
            color: #006621;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .result-desc {
            color: #545454;
            font-size: 14px;
        }

        .hidden {
            display: none;
        }

        .green-check {
            color: #2ecc71;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2c46;
            color: #ffdfb3;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 9999;
            font-weight: bold;
            border: 1px solid #ffb347;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .row-highlight {
            background: #26334d;
            border-left: 4px solid #ffb347;
            padding: 8px 14px;
            font-family: monospace;
            border-radius: 20px;
            margin: 10px 0;
        }

        .clickable {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="quest-container" id="app">
    <div class="status-bar">
        <div class="points-badge">
            <span>💰 POINTS</span> <span id="pointsDisplay">0</span>
        </div>
        <div class="tracking-status">
            <span>📍</span> <span id="trackingText">Tracking: Pending</span>
        </div>
    </div>

    <div class="checkpoint-track">
        <div class="checkpoint-node" id="cp1Node">
            <div class="checkmark" id="cp1Mark">⏳</div>
            <div class="checkpoint-label">✅ Checkpoint 1 · 25 pts</div>
        </div>
        <div class="checkpoint-node" id="cp2Node">
            <div class="checkmark" id="cp2Mark">⏳</div>
            <div class="checkpoint-label">🌐 Checkpoint 2 · 75 pts</div>
        </div>
        <div class="checkpoint-node" id="cp3Node">
            <div class="checkmark" id="cp3Mark">🔒</div>
            <div class="checkpoint-label">🎯 Final · Verification</div>
        </div>
    </div>

    <div class="task-panel" id="taskPanel">
        <div class="task-header">
            <span id="taskTitle">📍 Allow Tracking First</span>
            <span class="reward" id="taskReward">+25 pts</span>
        </div>
        <div id="taskDescription" class="info-message">
            🔐 You must click "Allow Tracking" (Chrome/Safari permission popup). Then checkpoints unlock.
        </div>
        <div id="actionArea"></div>
        <div id="simulatorArea" class="hidden"></div>
        <div id="verificationMessage" class="info-message hidden"></div>
    </div>
</div>

<script>
    let currentCheckpoint = 0;
    let totalPoints = 0;
    let trackingAllowed = false;
    let checkpoint1Completed = false;
    let checkpoint2Completed = false;
    
    const CORRECT_LINK = "https://schedulebuilder.org/";
    
    const pointsSpan = document.getElementById('pointsDisplay');
    const cp1Node = document.getElementById('cp1Node');
    const cp2Node = document.getElementById('cp2Node');
    const cp3Node = document.getElementById('cp3Node');
    const cp1Mark = document.getElementById('cp1Mark');
    const cp2Mark = document.getElementById('cp2Mark');
    const cp3Mark = document.getElementById('cp3Mark');
    const taskTitleSpan = document.getElementById('taskTitle');
    const taskRewardSpan = document.getElementById('taskReward');
    const taskDescDiv = document.getElementById('taskDescription');
    const actionArea = document.getElementById('actionArea');
    const simulatorArea = document.getElementById('simulatorArea');
    const verificationMsgDiv = document.getElementById('verificationMessage');
    const trackingTextSpan = document.getElementById('trackingText');
    
    function updatePointsUI() {
        pointsSpan.innerText = totalPoints;
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function updateCheckpointVisuals() {
        if (checkpoint1Completed) {
            cp1Node.classList.add('completed');
            cp1Mark.innerHTML = '✔️';
            cp1Mark.classList.add('green-check');
        } else {
            cp1Node.classList.remove('completed');
            cp1Mark.innerHTML = currentCheckpoint === 1 ? '⏳' : (trackingAllowed ? '◻️' : '🔒');
        }
        
        if (checkpoint2Completed) {
            cp2Node.classList.add('completed');
            cp2Mark.innerHTML = '✔️';
            cp2Mark.classList.add('green-check');
        } else {
            cp2Node.classList.remove('completed');
            cp2Mark.innerHTML = currentCheckpoint === 2 ? '⏳' : (checkpoint1Completed ? '◻️' : '🔒');
        }
        
        if (checkpoint1Completed && checkpoint2Completed) {
            cp3Node.classList.add('completed');
            cp3Mark.innerHTML = '🏆';
        } else {
            cp3Node.classList.remove('completed');
            cp3Mark.innerHTML = '🔒';
        }
        
        if (currentCheckpoint === 1 && !checkpoint1Completed) cp1Node.classList.add('active');
        else cp1Node.classList.remove('active');
        if (currentCheckpoint === 2 && !checkpoint2Completed) cp2Node.classList.add('active');
        else cp2Node.classList.remove('active');
    }
    
    function awardCheckpoint1() {
        if (checkpoint1Completed) return;
        checkpoint1Completed = true;
        totalPoints += 25;
        updatePointsUI();
        currentCheckpoint = 2;
        updateCheckpointVisuals();
        renderCurrentTask();
        showToast("🎉 +25 Points! Checkpoint 1 complete! Moving to Checkpoint 2 (75pts)");
    }
    
    function awardCheckpoint2() {
        if (checkpoint2Completed) return;
        checkpoint2Completed = true;
        totalPoints += 75;
        updatePointsUI();
        currentCheckpoint = 3;
        updateCheckpointVisuals();
        renderCurrentTask();
        showToast("🏆 +75 Points! You clicked the correct link! Mission complete!");
    }
    
    function renderCurrentTask() {
        if (!trackingAllowed) {
            taskTitleSpan.innerText = "🔔 Allow tracking (required)";
            taskRewardSpan.innerText = "🔓 Unlock system";
            taskDescDiv.innerHTML = "⚠️ Chrome / Safari will show a browser popup. You must click 'Allow' to start the checkpoint journey.";
            actionArea.innerHTML = `<button class="action-btn primary" id="requestTrackingBtn">📡 Request Tracking Permission</button>`;
            simulatorArea.classList.add('hidden');
            verificationMsgDiv.classList.add('hidden');
            const btn = document.getElementById('requestTrackingBtn');
            if (btn) btn.onclick = requestTrackingPermission;
            return;
        }
        
        if (!checkpoint1Completed) {
            taskTitleSpan.innerText = "🌐 Checkpoint 1 · Search 'Schedule Online' on Google";
            taskRewardSpan.innerText = "+25 pts";
            taskDescDiv.innerHTML = `
                <strong>📋 Instructions:</strong><br>
                1. Type "Schedule Online" in the Google search bar below<br>
                2. Click the search button or press Enter<br>
                3. The system will detect your search and award 25 points!
            `;
            actionArea.innerHTML = '';
            simulatorArea.classList.remove('hidden');
            simulatorArea.innerHTML = `
                <div class="search-simulator">
                    <div class="google-search-bar">
                        <input type="text" id="googleSearchInput" placeholder="Google Search" value="Schedule Online">
                        <button id="googleSearchBtn">🔍 Google Search</button>
                    </div>
                    <div id="searchResultsArea" class="search-results hidden"></div>
                </div>
            `;
            
            const searchInput = document.getElementById('googleSearchInput');
            const searchBtn = document.getElementById('googleSearchBtn');
            const resultsArea = document.getElementById('searchResultsArea');
            
            const performSearch = () => {
                const query = searchInput.value.trim();
                if (query.toLowerCase() === "schedule online") {
                    resultsArea.classList.remove('hidden');
                    resultsArea.innerHTML = `
                        <div style="padding: 10px; color: #34a853; font-weight: bold;">✓ Search successful! Detected "Schedule Online"</div>
                        <div class="result-item">
                            <div class="result-title">Schedule Online - Easy Booking Platform</div>
                            <div class="result-url">https://schedulebuilder.org/</div>
                            <div class="result-desc">Schedule appointments online easily with our free platform...</div>
                        </div>
                        <div class="result-item">
                            <div class="result-title">Online Scheduling Software</div>
                            <div class="result-url">https://calendly.com/</div>
                            <div class="result-desc">Simplify scheduling with online booking tools...</div>
                        </div>
                        <div class="result-item" id="targetResultItem">
                            <div class="result-title">ScheduleBuilder - Official Site</div>
                            <div class="result-url">https://schedulebuilder.org/</div>
                            <div class="result-desc">The official schedule building platform for professionals...</div>
                        </div>
                        <div class="result-item">
                            <div class="result-title">Schedule Online - Google Business</div>
                            <div class="result-url">https://business.google.com/</div>
                            <div class="result-desc">Manage appointments with Google Business...</div>
                        </div>
                    `;
                    
                    awardCheckpoint1();
                } else {
                    resultsArea.classList.remove('hidden');
                    resultsArea.innerHTML = `<div style="padding: 10px; color: #ea4335;">⚠️ Please search exactly: "Schedule Online" to complete checkpoint 1</div>`;
                }
            };
            
            searchBtn.onclick = performSearch;
            searchInput.onkeypress = (e) => { if (e.key === 'Enter') performSearch(); };
            
            return;
        }
        else if (!checkpoint2Completed) {
            taskTitleSpan.innerText = "🎯 Checkpoint 2 · Click the 4th Row Link";
            taskRewardSpan.innerText = "+75 pts";
            taskDescDiv.innerHTML = `
                <strong>🎯 Mission:</strong> In the search results below, click the <strong>4th row link</strong> that matches exactly:<br>
                <div class="row-highlight">🔗 ${CORRECT_LINK}</div>
                Once you click the correct matching URL, you'll receive 75 points!
            `;
            actionArea.innerHTML = `<button class="action-btn secondary" id="resetSearchCp2">🔄 Reset Search Results</button>`;
            simulatorArea.classList.remove('hidden');
            simulatorArea.innerHTML = `
                <div class="search-simulator">
                    <div class="google-search-bar" style="background: #f2f2f2;">
                        <input type="text" value="Schedule Online" disabled style="background: #f8f9fa;">
                        <button disabled style="background: #9aa0a6;">🔍</button>
                    </div>
                    <div class="search-results">
                        <div class="result-item">
                            <div class="result-title">Schedule Online - Easy Booking Platform</div>
                            <div class="result-url">https://booking.example.com/</div>
                            <div class="result-desc">Book appointments online instantly...</div>
                        </div>
                        <div class="result-item">
                            <div class="result-title">Online Scheduling Software</div>
                            <div class="result-url">https://calendly.com/</div>
                            <div class="result-desc">Simplify scheduling with online booking tools...</div>
                        </div>
                        <div class="result-item">
                            <div class="result-title">ScheduleBuilder Pro</div>
                            <div class="result-url">https://schedulebuilderpro.com/</div>
                            <div class="result-desc">Advanced scheduling for businesses...</div>
                        </div>
                        <div class="result-item clickable" id="correctLinkRow">
                            <div class="result-title" style="color: #1a0dab;">⭐ ScheduleBuilder Official</div>
                            <div class="result-url" style="color: #006621;">https://schedulebuilder.org/</div>
                            <div class="result-desc">The official schedule building platform - 4th row link</div>
                            <div style="margin-top: 8px;"><span style="background: #f5b04220; padding: 2px 8px; border-radius: 12px; font-size: 12px;">🎯 Correct target link (4th row)</span></div>
                        </div>
                        <div class="result-item">
                            <div class="result-title">Schedule Online - Google Business</div>
                            <div class="result-url">https://business.google.com/</div>
                            <div class="result-desc">Manage appointments with Google Business...</div>
                        </div>
                    </div>
                </div>
            `;
            
            const resetBtn = document.getElementById('resetSearchCp2');
            if (resetBtn) {
                resetBtn.onclick = () => {
                    renderCurrentTask();
                    showToast("Search results reset!");
                };
            }
            
            const correctElement = document.getElementById('correctLinkRow');
            if (correctElement) {
                correctElement.onclick = () => {
                    if (!checkpoint2Completed) {
                        awardCheckpoint2();
                    }
                };
                correctElement.style.cursor = 'pointer';
            }
            return;
        }
        else {
            taskTitleSpan.innerText = "🎉 Challenge Complete!";
            taskRewardSpan.innerText = "🏁 Finished";
            taskDescDiv.innerHTML = `✨ You collected ${totalPoints} points! Great job completing both checkpoints.`;
            actionArea.innerHTML = `<button class="action-btn" disabled>✅ Mission Accomplished</button>`;
            simulatorArea.classList.add('hidden');
            verificationMsgDiv.classList.remove('hidden');
            verificationMsgDiv.innerHTML = `🏅 Congratulations! All checkpoints passed. Total points: ${totalPoints}`;
            return;
        }
    }
    
    function requestTrackingPermission() {
        if (trackingAllowed) {
            showToast("Tracking already allowed!");
            return;
        }
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    trackingAllowed = true;
                    trackingTextSpan.innerText = "Tracking: ACTIVE ✅";
                    currentCheckpoint = 1;
                    updateCheckpointVisuals();
                    renderCurrentTask();
                    showToast("✅ Tracking allowed! Now proceed to Checkpoint 1 (25pts).");
                },
                (error) => {
                    showToast("❌ You must allow tracking permission to continue. Click again and select 'Allow'.");
                    trackingTextSpan.innerText = "Tracking: DENIED";
                },
                { enableHighAccuracy: false, timeout: 8000 }
            );
        } else {
            if(confirm("Browser doesn't support auto-permission. Simulate tracking? (Click OK for demo)")) {
                trackingAllowed = true;
                trackingTextSpan.innerText = "Tracking: ACTIVE (simulated)";
                currentCheckpoint = 1;
                updateCheckpointVisuals();
                renderCurrentTask();
                showToast("Tracking manually allowed (demo mode)");
            }
        }
    }
    
    function init() {
        trackingAllowed = false;
        checkpoint1Completed = false;
        checkpoint2Completed = false;
        totalPoints = 0;
        currentCheckpoint = 0;
        updatePointsUI();
        trackingTextSpan.innerText = "Tracking: Pending";
        updateCheckpointVisuals();
        renderCurrentTask();
    }
    
    init();
</script>
</body>
</html>
